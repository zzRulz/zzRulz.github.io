9bc; --border-bright: #b5b1a3;\n    --accent-green: #3d7a3d; --accent-green-dim: #8ab08a;\n    --accent-amber: #a66818; --accent-amber-dim: #d4a76a;\n    --accent-cyan: #2d6b7a; --accent-cyan-dim: #8ab5bf;\n    --accent-magenta: #8a3a6b; --accent-magenta-dim: #c08aa8;\n  }\n  :root[data-accent=\"amber\"]   { --accent: var(--accent-amber);   --accent-dim: var(--accent-amber-dim); }\n  :root[data-accent=\"cyan\"]    { --accent: var(--accent-cyan);    --accent-dim: var(--accent-cyan-dim); }\n  :root[data-accent=\"magenta\"] { --accent: var(--accent-magenta); --accent-dim: var(--accent-magenta-dim); }\n  :root[data-density=\"compact\"]  { --gap-l: 16px; --gap-xl: 28px; }\n  :root[data-density=\"spacious\"] { --gap-l: 36px; --gap-xl: 72px; }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    background: var(--bg); color: var(--fg);\n    font-family: var(--font-mono); font-size: var(--fs-base);\n    line-height: 1.55; font-weight: 400;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh; overflow-x: hidden;\n  }\n  body::before {\n    content: ''; position: fixed; inset: 0; pointer-events: none;\n    background-image: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px);\n    z-index: 1000; mix-blend-mode: overlay;\n  }\n  :root[data-theme=\"light\"] body::before { opacity: 0.4; mix-blend-mode: multiply; }\n  ::selection { background: var(--accent); color: var(--bg); }\n  a { color: var(--accent); text-decoration: none; }\n  a:hover { text-decoration: underline; text-underline-offset: 3px; }\n\n  /* CHROME */\n  .chrome {\n    position: sticky; top: 0; z-index: 50;\n    background: var(--bg-2); border-bottom: 1px solid var(--border);\n    display: flex; align-items: center;\n    padding: 0 var(--gap-l); height: 32px;\n    font-size: var(--fs-xs); color: var(--fg-dim); gap: var(--gap-m);\n  }\n  .chrome-dots { display: flex; gap: 6px; }\n  .chrome-dots span { width: 11px; height: 11px; border-radius: 50%; background: var(--border-bright); cursor: pointer; }\n  .chrome-dots span:nth-child(1) { background: #e06c6c; transition: filter 0.1s; }\n  .chrome-dots span:nth-child(2) { background: #e6c06c; }\n  .chrome-dots span:nth-child(3) { background: #7fbf6c; }\n  .chrome-dots span:nth-child(1):hover { filter: brightness(1.3); }\n\n  /* Sticky name that slides in when hero scrolls away */\n  .chrome-sticky-name {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    overflow: hidden;\n    max-width: 0;\n    opacity: 0;\n    transform: translateX(-16px);\n    transition: max-width 0.45s cubic-bezier(0.22,1,0.36,1),\n                opacity 0.35s ease,\n                transform 0.45s cubic-bezier(0.22,1,0.36,1);\n    white-space: nowrap;\n    pointer-events: none;\n  }\n  .chrome-sticky-name.visible {\n    max-width: 280px;\n    opacity: 1;\n    transform: translateX(0);\n  }\n  .chrome-sticky-name .sn-dot {\n    width: 5px; height: 5px; border-radius: 50%;\n    background: var(--accent); flex-shrink: 0;\n    box-shadow: 0 0 5px var(--accent);\n  }\n  .chrome-sticky-name .sn-text {\n    font-size: var(--fs-xs);\n    font-weight: 500;\n    color: var(--fg);\n    letter-spacing: 0.04em;\n  }\n  .chrome-sticky-name .sn-role {\n    font-size: var(--fs-xs);\n    color: var(--fg-dim);\n  }\n  .chrome-title { flex: 1; text-align: center; letter-spacing: 0.04em; }\n  .chrome-title b { color: var(--fg); font-weight: 500; }\n  .chrome-status { display: flex; gap: var(--gap-m); font-variant-numeric: tabular-nums; }\n  .chrome-status .dot {\n    display: inline-block; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--accent); margin-right: 4px; vertical-align: middle;\n    box-shadow: 0 0 6px var(--accent);\n  }\n\n  /* LAYOUT */\n  main { max-width: 1040px; margin: 0 auto; padding: var(--gap-xl) var(--gap-l); }\n  section { padding: var(--gap-xl) 0; border-bottom: 1px dashed var(--border); }\n  section:last-child { border-bottom: none; }\n  .prompt { color: var(--fg-dim); font-size: var(--fs-sm); margin-bottom: var(--gap-m); letter-spacing: 0.02em; }\n  .prompt .user { color: var(--accent); }\n  .prompt .host { color: var(--fg); }\n  .prompt .path { color: var(--blue); }\n  .prompt .cmd  { color: var(--fg); font-weight: 500; }\n  .section-label { font-size: var(--fs-xs); color: var(--fg-faint); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: var(--gap-s); }\n  .cursor {\n    display: inline-block; width: 0.6em; height: 1.1em;\n    background: var(--accent); vertical-align: text-bottom;\n    animation: blink 1.1s steps(1) infinite; margin-left: 2px;\n  }\n  :root[data-blink=\"false\"] .cursor { animation: none; }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  /* HERO */\n  .hero { padding-top: var(--gap-xl); }\n  .hero h1 { font-family: var(--font-mono); font-size: var(--fs-2xl); font-weight: 500; margin: 0; letter-spacing: -0.02em; line-height: 1.05; }\n  .hero h1 .bracket { color: var(--accent); }\n  .hero h1 .dim { color: var(--fg-dim); font-weight: 400; }\n  .hero-tag { font-size: var(--fs-sm); color: var(--fg-dim); margin-top: var(--gap-m); max-width: 90ch; line-height: 1.7; }\n\n  /* ASCII BANNER — no scrollbar, clip overflow */\n  .ascii-banner {\n    font-family: var(--font-mono); font-size: 10px; line-height: 1.0;\n    color: var(--accent); white-space: pre;\n    margin: var(--gap-l) 0 var(--gap-l);\n    overflow: hidden;\n    letter-spacing: 0;\n    -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);\n    mask-image: linear-gradient(to right, black 70%, transparent 100%);\n    cursor: crosshair;\n  }\n  .ascii-banner.glitching {\n    animation: banner-shake 0.08s steps(1) infinite;\n  }\n  @keyframes banner-shake {\n    0%   { transform: translateX(0) skewX(0deg); }\n    20%  { transform: translateX(-2px) skewX(-1deg); }\n    40%  { transform: translateX(2px) skewX(1deg); }\n    60%  { transform: translateX(-1px) skewX(0.5deg); }\n    80%  { transform: translateX(1px) skewX(-0.5deg); }\n    100% { transform: translateX(0) skewX(0deg); }\n  }\n  /* individual banner chars for animation */\n  .ascii-banner .bc { display: inline; transition: none; }\n\n  /* STATS */\n  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: var(--gap-l); }\n  .stat { background: var(--bg); padding: var(--gap-m) var(--gap-l); }\n  .stat-label { font-size: var(--fs-xs); color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.15em; }\n  .stat-value { font-size: var(--fs-lg); color: var(--fg); margin-top: 4px; font-weight: 500; font-variant-numeric: tabular-nums; }\n  .stat-value .unit { color: var(--fg-dim); font-size: var(--fs-sm); margin-left: 4px; }\n\n  @media (max-width: 700px) {\n    .stats { grid-template-columns: repeat(2, 1fr); }\n    .hero h1 { font-size: 32px; }\n    .ascii-banner { font-size: 7px; }\n  }\n\n  /* WHOAMI */\n  .whoami-grid { display: grid; grid-template-columns: 180px 1fr; gap: var(--gap-l); margin-top: var(--gap-l); }\n  .whoami-grid dt { color: var(--fg-faint); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.15em; padding-top: 3px; }\n  .whoami-grid dd { margin: 0; color: var(--fg); font-size: var(--fs-base); border-bottom: 1px dotted var(--border); padding-bottom: var(--gap-m); }\n  .whoami-grid dd:last-of-type { border-bottom: none; }\n  .whoami-grid dd .k { color: var(--accent); }\n  .bio { color: var(--fg); max-width: 90ch; line-height: 1.75; font-size: var(--fs-base); margin-top: var(--gap-l); }\n  .bio .accent { color: var(--accent); }\n  .bio .dim { color: var(--fg-dim); }\n\n  /* PROJECTS */\n  .project-filters { display: flex; gap: var(--gap-m); margin: var(--gap-l) 0; font-size: var(--fs-sm); flex-wrap: wrap; }\n  .project-filters button {\n    background: transparent; border: 1px solid var(--border); color: var(--fg-dim);\n    padding d);\n      if (saved.projects)  saved.projects.forEach(sp => { const p = PROJECTS.find(x => x.id === sp.id); if(p){ p.title = sp.title; p.desc = sp.desc; } });\n      if (saved.timeline)  TIMELINE = saved.timeline;\n    }\n  } catch(e) {}\n}\n\nfunction deepMerge(base, over) {\n  const r = { ...base };\n  for (const k in over) {\n    if (over[k] && typeof over[k] === 'object' && !Array.isArray(over[k])) {\n      r[k] = deepMerge(base[k] || {}, over[k]);\n    } else {\n      r[k] = over[k];\n    }\n  }\n  return r;\n}\n\n/* ════════════════════════════════════════════ */\n/*  APPLY DATA TO DOM                          */\n/* ════════════════════════════════════════════ */\nfunction applyData() {\n  document.getElementById('hero-title-text').textContent = DATA.heroTitle;\n  // start animation\n  startAnim(DATA.asciiAnim || 'none');\n  document.getElementById('hero-subtitle-text').textContent = DATA.heroSubtitle;\n  document.getElementById('hero-tag-text').innerHTML = DATA.heroTag;\n  document.getElementById('w-role').textContent = DATA.whoami.role;\n  document.getElementById('w-spec').textContent = DATA.whoami.spec;\n  document.getElementById('w-env').textContent = DATA.whoami.env;\n  document.getElementById('w-terrain').textContent = DATA.whoami.terrain;\n  document.getElementById('w-loc').textContent = DATA.whoami.loc;\n  document.getElementById('w-status').textContent = DATA.whoami.status;\n  document.getElementById('bio-text').textContent = DATA.bio;\n\n  // stats\n  const sg = document.getElementById('stats-grid');\n  sg.innerHTML = DATA.stats.map(s => `<div class=\"stat\"><div class=\"stat-label\">${s.label}<\u002Fdiv><div class=\"stat-value\">${s.value}${s.unit ? `<span class=\"unit\">${s.unit}<\u002Fspan>` : ''}<\u002Fdiv><\u002Fdiv>`).join('');\n\n  // contact cells (dynamic)\n  renderContactCells();\n\n  // contact note\n  const lines = DATA.contactNote.split('|');\n  document.getElementById('contact-note').innerHTML = lines.map(l => `<div><span style=\"color:var(--accent)\">&gt;<\u002Fspan> ${l}<\u002Fdiv>`).join('');\n}\n\n/* ════════════════════════════════════════════ */\n/*  RENDER                                     */\n/* ════════════════════════════════════════════ */\nfunction renderProjects(filter='all') {\n  const container = document.getElementById('projects-table');\n  const filtered = filter==='all' ? PROJECTS : PROJECTS.filter(p => p.cat===filter);\n  document.getElementById('filter-count').textContent = `${filtered.length} projet${filtered.length>1?'s':''}`;\n  container.innerHTML = filtered.map((p,idx) => `\n    <div class=\"project\" data-id=\"${p.id}\">\n      <div class=\"project-idx\">${String(idx+1).padStart(2,'0')}<\u002Fdiv>\n      <div class=\"project-body\">\n        <div class=\"project-head\"><div class=\"project-title\">${p.title}<\u002Fdiv><div class=\"project-type\">// ${p.type}<\u002Fdiv><\u002Fdiv>\n        <div class=\"project-desc\">${p.desc}<\u002Fdiv>\n        <div class=\"project-meta\">${p.meta.map(m=>`<span class=\"tag\">${m}<\u002Fspan>`).join('')}<\u002Fdiv>\n        <div class=\"project-detail\">\n          <div class=\"project-detail-grid\">\n            <div class=\"detail-block\"><h4>// specs<\u002Fh4><ul>${Object.entries(p.specs).map(([k,v])=>`<li><span>${k}<\u002Fspan><span class=\"v\">${v}<\u002Fspan><\u002Fli>`).join('')}<\u002Ful><\u002Fdiv>\n            <div class=\"detail-block\"><h4>// résultats<\u002Fh4><ul>${Object.entries(p.stats).map(([k,v])=>`<li><span>${k}<\u002Fspan><span class=\"v\">${v}<\u002Fspan><\u002Fli>`).join('')}<\u002Ful><\u002Fdiv>\n          <\u002Fdiv>\n          ${p.rack ? `<div class=\"ascii-rack\">${p.rack}<\u002Fdiv>` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"project-side\">${p.meta[0]||''}<span class=\"status ${p.id==='helpdesk'?'':'offline'}\">${p.id==='helpdesk'?'● live':'● shipped'}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`).join('');\n  container.querySelectorAll('.project').forEach(el => {\n    el.addEventListener('click', e => { if(e.target.closest('.project-detail')) return; el.classList.toggle('open'); });\n  });\n}\n\nfunction renderSkills() {\n  const el = document.getElementById('skills-file');\n  const lines = [];\n  lines.push('<span class=\"comment\"># /etc/skills.conf — last edited '+new Date().toISOString().slice(0,10)+'<\u002Fspan>');\n  lines.push('<span class=\"comment\"># 4 = expert · 3 = solide · 2 = familier · 1 = débutant<\u002Fspan>');\n  lines.push('');\n  SKILLS.forEach(grp => {\n    lines.push(`<span class=\"section-hdr\">${grp.section}<\u002Fspan>`);\n    grp.items.forEach(([name,lvl]) => {\n      const bars = '■'.repeat(lvl)+`<span class=\"off\">${'_'.repeat(4-lvl)}<\u002Fspan>`;\n      lines.push(`  <span class=\"key\">${name}<\u002Fspan><span class=\"val\">= <span class=\"lvl\">${bars}<\u002Fspan><\u002Fspan>`);\n    });\n  });\n  el.innerHTML = lines.join('\\n');\n  el.style.whiteSpace = 'pre';\n}\n\nfunction renderTimeline() {\n  const el = document.getElementById('timeline');\n  el.innerHTML = TIMELINE.map(t => `\n    <div class=\"timeline-row\">\n      <div class=\"timeline-date\">${t.date}<\u002Fdiv>\n      <div class=\"timeline-body\"><div><span class=\"t-title\">${t.title}<\u002Fspan><span class=\"t-where\">${t.where}<\u002Fspan><\u002Fdiv><div class=\"t-desc\">${t.desc}<\u002Fdiv><\u002Fdiv>\n      <div class=\"timeline-side\">${t.side}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\n/* ════════════════════════════════════════════ */\n/*  ADMIN CMS                                  */\n/* ════════════════════════════════════════════ */\nconst ADMIN_PASS = 'admin2026';\nlet adminUnlocked = false;\n// Triple-click on red dot\nlet redClicks = 0, redTimer;\ndocument.getElementById('red-dot').addEventListener('click', () => {\n  if (!ADMIN_ENABLED) return;\n  redClicks++;\n  clearTimeout(redTimer);\n  redTimer = setTimeout(() => { redClicks = 0; }, 600);\n  if (redClicks >= 3) {\n    redClicks = 0;\n    openAuth();\n  }\n});\n\nfunction openAuth() {\n  if (adminUnlocked) { openAdmin(); return; }\n  const auth = document.getElementById('admin-auth');\n  auth.classList.add('open');\n  const input = document.getElementById('auth-input');\n  input.value = '';\n  document.getElementById('auth-error').classList.remove('show');\n  setTimeout(() => input.focus(), 100);\n}\n\ndocument.getElementById('auth-input').addEventListener('keydown', e => {\n  if (e.key === 'Enter') {\n    e.preventDefault();\n    const val = e.target.value;\n    if (val === ADMIN_PASS) {\n      adminUnlocked = true;\n      document.getElementById('admin-auth').classList.remove('open');\n      openAdmin();\n    } else {\n      const err = document.getElementById('auth-error');\n      err.classList.add('show');\n      e.target.value = '';\n      e.target.style.animation = 'shake 0.3s';\n      setTimeout(() => e.target.style.animation = '', 300);\n    }\n  }\n  if (e.key === 'Escape') document.getElementById('admin-auth').classList.remove('open');\n});\n\nfunction openAdmin() {\n  populateAdminFields();\n  document.getElementById('admin-overlay').classList.add('open');\n  document.getElementById('admin-dot').style.display = 'inline-block';\n}\n\nfunction closeAdmin() {\n  document.getElementById('admin-overlay').classList.remove('open');\n  document.getElementById('admin-dot').style.display = 'none';\n}\n\ndocument.getElementById('adm-close').addEventListener('click', closeAdmin);\ndocument.getElementById('adm-cancel').addEventListener('click', closeAdmin);\ndocument.addEventListener('keydown', e => { if (e.key === 'Escape') closeAdmin(); });\n\n// Tabs\ndocument.querySelectorAll('.adm-tab').forEach(tab => {\n  tab.addEventListener('click', () => {\n    document.querySelectorAll('.adm-tab').forEach(t => t.classList.remove('active'));\n    document.querySelectorAll('.adm-panel').forEach(p => p.classList.remove('active'));\n    tab.classList.add('active');\n    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');\n  });\n});\n\nfunction populateAdminFields() {\n  // anim picker\n  document.querySelectorAll('.anim-btn').forEach(btn => {\n    btn.classList.toggle('on', btn.dataset.anim === (DATA.asciiAnim || 'none'));\n    btn.onclick = () => {\n      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('on'));\n      btn.classList.add('on');\n      DATA.asciiAnim = btn.dataset.anim;\n      startAnim(DATA.asciiAnim); // live preview while admin is open\n    };\n  });\n\n  renderCellsEditor();\n\n  // bind cell count slider live\n  const slider = document.getElementById('adm-cell-count');\n  const countVal = document.getElementById('adm-cell-count-val');\n  if (slider) {\n    slider.oninput = () => {\n      DATA.contactCellCount = parseInt(slider.value);\n      countVal.textContent = slider.value;\n      renderCellsEditor();\n    };\n  }\n\n  document.getElementById('adm-hero-title').value = DATA.heroTitle;\n  document.getElementById('adm-hero-subtitle').value = DATA.heroSubtitle;\n  document.getElementById('adm-hero-tag').value = DATA.heroTag;\n  document.getElementById('adm-w-role').value = DATA.whoami.role;\n  document.getElementById('adm-w-spec').value = DATA.whoami.spec;\n  document.getElementById('adm-w-env').value = DATA.whoami.env;\n  document.getElementById('adm-w-terrain').value = DATA.whoami.terrain;\n  document.getElementById('adm-w-loc').value = DATA.whoami.loc;\n  document.getElementById('adm-w-status').value = DATA.whoami.status;\n  document.getElementById('adm-bio').value = DATA.bio;\n  document.getElementById('adm-contact-note').value = DATA.contactNote;\n\n  // Stats\n  const sf = document.getElementById('adm-stats-fields');\n  sf.innerHTML = DATA.stats.map((s,i) => `\n    <div class=\"adm-block\">\n      <div class=\"adm-block-title\">stats[${i}]<\u002Fdiv>\n      <div class=\"adm-row-2\">\n        <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">label<\u002Flabel><input class=\"adm-input\" data-stat=\"${i}\" data-key=\"label\" value=\"${s.label}\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 60px;gap:8px\">\n          <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">valeur<\u002Flabel><input class=\"adm-input\" data-stat=\"${i}\" data-key=\"value\" value=\"${s.value}\"><\u002Fdiv>\n          <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">unité<\u002Flabel><input class=\"adm-input\" data-stat=\"${i}\" data-key=\"unit\" value=\"${s.unit}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  // Projects\n  const pf = document.getElementById('adm-projects-fields');\n  pf.innerHTML = PROJECTS.map((p,i) => `\n    <div class=\"adm-block\">\n      <div class=\"adm-block-title\">${String(i+1).padStart(2,'0')} · ${p.id}<\u002Fdiv>\n      <div class=\"adm-field\" style=\"margin-bottom:8px\">\n        <div class=\"adm-field-label\"><span class=\"f-key\">title<\u002Fspan><\u002Fdiv>\n        <input class=\"adm-input\" data-proj=\"${p.id}\" data-key=\"title\" value=\"${p.title}\">\n      <\u002Fdiv>\n      <div class=\"adm-field\" style=\"margin-bottom:0\">\n        <div class=\"adm-field-label\"><span class=\"f-key\">desc<\u002Fspan><\u002Fdiv>\n        <textarea class=\"adm-textarea\" data-proj=\"${p.id}\" data-key=\"desc\" style=\"min-height:60px\">${p.desc}<\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  // Timeline\n  const tf = document.getElementById('adm-timeline-fields');\n  tf.innerHTML = TIMELINE.map((t,i) => `\n    <div class=\"adm-block\">\n      <div class=\"adm-block-title\">entry[${i}]<\u002Fdiv>\n      <div class=\"adm-row-2\" style=\"margin-bottom:8px\">\n        <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">date<\u002Flabel><input class=\"adm-input\" data-tl=\"${i}\" data-key=\"date\" value=\"${t.date}\"><\u002Fdiv>\n        <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">badge<\u002Flabel><input class=\"adm-input\" data-tl=\"${i}\" data-key=\"side\" value=\"${t.side}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"adm-row-2\" style=\"margin-bottom:8px\">\n        <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">titre<\u002Flabel><input class=\"adm-input\" data-tl=\"${i}\" data-key=\"title\" value=\"${t.title}\"><\u002Fdiv>\n        <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">lieu<\u002Flabel><input class=\"adm-input\" data-tl=\"${i}\" data-key=\"where\" value=\"${t.where}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">description<\u002Flabel><textarea class=\"adm-textarea\" data-tl=\"${i}\" data-key=\"desc\" style=\"min-height:50px\">${t.desc}<\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  // last save\n  const ts = localStorage.getItem(LS_KEY+'_ts');\n  if (ts) document.getElementById('adm-status').textContent = `// sauvé: ${new Date(parseInt(ts)).toLocaleString('fr')}`;\n}\n\ndocument.getElementById('adm-save').addEventListener('click', () => {\n  // collect\n  // asciiAnim already live-set by picker buttons\n  DATA.heroTitle    = document.getElementById('adm-hero-title').value;\n  DATA.heroSubtitle = document.getElementById('adm-hero-subtitle').value;\n  DATA.heroTag      = document.getElementById('adm-hero-tag').value;\n  DATA.whoami.role    = document.getElementById('adm-w-role').value;\n  DATA.whoami.spec    = document.getElementById('adm-w-spec').value;\n  DATA.whoami.env     = document.getElementById('adm-w-env').value;\n  DATA.whoami.terrain = document.getElementById('adm-w-terrain').value;\n  DATA.whoami.loc     = document.getElementById('adm-w-loc').value;\n  DATA.whoami.status  = document.getElementById('adm-w-status').value;\n  DATA.bio = document.getElementById('adm-bio').value;\n  DATA.contactNote = document.getElementById('adm-contact-note').value;\n  // contact cells\n  document.querySelectorAll('[data-cell][data-key]').forEach(el => {\n    const i = parseInt(el.dataset.cell);\n    if (!DATA.contactCells[i]) DATA.contactCells[i] = {};\n    DATA.contactCells[i][el.dataset.key] = el.value;\n  });\n  DATA.contactCellCount = parseInt(document.getElementById('adm-cell-count')?.value ?? 4);\n\n  // stats\n  document.querySelectorAll('[data-stat]').forEach(el => {\n    const i = parseInt(el.dataset.stat); const k = el.dataset.key;\n    if (!DATA.stats[i]) DATA.stats[i] = {};\n    DATA.stats[i][k] = el.value;\n  });\n  // projects\n  document.querySelectorAll('[data-proj]').forEach(el => {\n    const id = el.dataset.proj; const k = el.dataset.key;\n    const p = PROJECTS.find(x => x.id === id);\n    if (p) p[k] = el.value;\n  });\n  // timeline\n  document.querySelectorAll('[data-tl]').forEach(el => {\n    const i = parseInt(el.dataset.tl); const k = el.dataset.key;\n    if (!TIMELINE[i]) TIMELINE[i] = {};\n    TIMELINE[i][k] = el.value;\n  });\n\n  // persist\n  const toSave = {\n    ...DATA,\n    projects: PROJECTS.map(p => ({ id:p.id, title:p.title, desc:p.desc })),\n    timeline: TIMELINE\n  };\n  localStorage.setItem(LS_KEY, JSON.stringify(toSave));\n  localStorage.setItem(LS_KEY+'_ts', Date.now().toString());\n\n  // re-render\n  applyData();\n  renderProjects();\n  renderTimeline();\n\n  const status = document.getElementById('adm-status');\n  status.textContent = `// sauvé: ${new Date().toLocaleTimeString('fr')}`;\n  status.classList.add('saved');\n  setTimeout(() => status.classList.remove('saved'), 2000);\n});\n\n/* ════════════════════════════════════════════ */\n/*  ASCII BANNER ANIMATION ENGINE              */\n/* ════════════════════════════════════════════ */\n\nlet _animRAF = null, _animState = {};\nconst GLITCH_CHARS = '░▒▓█▄▀■_|/\\\\-+~#@%&*^';\n\nfunction initBanner() {\n  const banner = document.querySelector('.ascii-banner');\n  if (!banner || banner.dataset.parsed) return;\n  const text = banner.textContent;\n  let row = 0, col = 0, html = '';\n  for (const c of text) {\n    if (c === '\\n') { html += '\\n'; row++; col = 0; }\n    else if (c === ' ') { html += ' '; col++; }\n    else {\n      const esc = c.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\n      html += `<span class=\"bc\" data-row=\"${row}\" data-col=\"${col}\" data-orig=\"${esc}\">${esc}<\u002Fspan>`;\n      col++;\n    }\n  }\n  banner.innerHTML = html;\n  banner.dataset.parsed = '1';\n  banner.dataset.rows = row;\n\n  // Hover glitch effect\n  let glitchInterval = null;\n  const GCHARS = '░▒▓█▄▀■_|/\\\\-+~#@%&*^';\n  function startHoverGlitch() {\n    banner.classList.add('glitching');\n    glitchInterval = setInterval(() => {\n      const spans = [...banner.querySelectorAll('.bc')];\n      const count = Math.floor(spans.length * 0.08);\n      for (let i = 0; i < count; i++) {\n        const s = spans[Math.floor(Math.random() * spans.length)];\n        const orig = s.dataset.orig;\n        s.textContent = Math.random() < 0.5 ? GCHARS[Math.floor(Math.random() * GCHARS.length)] : orig;\n        s.style.color = Math.random() < 0.3 ? 'var(--red)' : Math.random() < 0.5 ? 'var(--fg)' : '';\n        setTimeout(() => { s.textContent = orig; s.style.color = ''; }, 80 + Math.random() * 120);\n      }\n    }, 40);\n  }\n  function stopHoverGlitch() {\n    banner.classList.remove('glitching');\n    clearInterval(glitchInterval);\n    banner.querySelectorAll('.bc').forEach(s => { s.textContent = s.dataset.orig; s.style.color = ''; });\n  }\n  banner.addEventListener('mouseenter', startHoverGlitch);\n  banner.addEventListener('mouseleave', stopHoverGlitch);\n}\n\nfunction stopAnim() {\n  if (_animRAF) { cancelAnimationFrame(_animRAF); _animRAF = null; }\n  _animState = {};\n  document.querySelectorAll('.ascii-banner .bc').forEach(s => {\n    s.style.opacity = '';\n    s.style.color = '';\n    s.textContent = s.dataset.orig;\n  });\n}\n\nfunction startAnim(name) {\n  stopAnim();\n  if (!name || name === 'none') return;\n  initBanner();\n  const spans = [...document.querySelectorAll('.ascii-banner .bc')];\n  if (!spans.length) return;\n\n  _animState = { frame: 0, spans };\n\n  const ANIMS = {\n\n    glitch(f, s) {\n      if (f % 3 === 0) {\n        s.spans.forEach(sp => {\n          if (Math.random() < 0.018) {\n            sp.textContent = GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)];\n            sp.style.color = Math.random() < 0.5 ? 'var(--fg)' : 'var(--red)';\n            sp.style.opacity = '1';\n            setTimeout(() => { sp.textContent = sp.dataset.orig; sp.style.color = ''; sp.style.opacity = ''; }, 60 + Math.random()*80);\n          }\n        });\n      }\n    },\n\n    pulse(f, s) {\n      const v = (Math.sin(f * 0.04) + 1) / 2;\n      const o = (0.25 + v * 0.75).toFixed(3);\n      s.spans.forEach(sp => sp.style.opacity = o);\n    },\n\n    wave(f, s) {\n      s.spans.forEach(sp => {\n        const col = parseInt(sp.dataset.col);\n        const row = parseInt(sp.dataset.row);\n        const v = (Math.sin(f * 0.05 + col * 0.12 + row * 0.3) + 1) / 2;\n        sp.style.opacity = (0.15 + v * 0.85).toFixed(3);\n      });\n    },\n\n    scan(f, s) {\n      const rows = parseInt(document.querySelector('.ascii-banner').dataset.rows || 6);\n      const speed = 0.06;\n      const head = (f * speed) % (rows + 4) - 2;\n      s.spans.forEach(sp => {\n        const row = parseInt(sp.dataset.row);\n        const dist = row - head;\n        if (dist >= 0 && dist < 1)       { sp.style.opacity = '1';   sp.style.color = 'var(--fg)'; }\n        else if (dist >= 1 && dist < 2)  { sp.style.opacity = '0.7'; sp.style.color = ''; }\n        else if (dist < 0 && dist > -2)  { sp.style.opacity = (1 + dist * 0.4).toFixed(2); sp.style.color = ''; }\n        else                              { sp.style.opacity = '0.2'; sp.style.color = ''; }\n      });\n    },\n\n    flicker(f, s) {\n      if (Math.random() < 0.04) {\n        const o = Math.random() < 0.6 ? (Math.random()*0.3).toFixed(2) : '1';\n        s.spans.forEach(sp => sp.style.opacity = o);\n        const restore = 30 + Math.random() * 60;\n        setTimeout(() => s.spans.forEach(sp => sp.style.opacity = ''), restore);\n      }\n    },\n\n    rain(f, s) {\n      if (!s.cols) {\n        const map = {};\n        s.spans.forEach(sp => {\n          const c = sp.dataset.col;\n          if (!map[c]) map[c] = [];\n          map[c].push(sp);\n        });\n        s.cols = Object.values(map);\n        s.heads = s.cols.map((_, i) => -(Math.random() * 8) - i * 0.3);\n      }\n      if (f % 2 !== 0) return; // slow down\n      s.heads = s.heads.map((h, i) => {\n        const col = s.cols[i]; if (!col) return h;\n        const len = col.length;\n        const head = h;\n        col.forEach((sp, ri) => {\n          const d = ri - Math.floor(head);\n          if (d === 0)        { sp.style.opacity = '1';    sp.style.color = 'var(--fg)';     sp.textContent = GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)]; }\n          else if (d === -1)  { sp.style.opacity = '0.75'; sp.style.color = 'var(--accent)'; sp.textContent = sp.dataset.orig; }\n          else if (d === -2)  { sp.style.opacity = '0.45'; sp.style.color = '';              sp.textContent = sp.dataset.orig; }\n          else if (d === -3)  { sp.style.opacity = '0.2';  sp.style.color = '';              sp.textContent = sp.dataset.orig; }\n          else                { sp.style.opacity = '0.12'; sp.style.color = '';              sp.textContent = sp.dataset.orig; }\n        });\n        const next = head + 0.18;\n        return next > len + 6 ? -(Math.random() * 10) : next;\n      });\n    },\n\n    typewriter(f, s) {\n      const period = 240;\n      const pos = (f % period) / period;\n      const total = s.spans.length;\n      s.spans.forEach((sp, i) => {\n        const frac = i / total;\n        sp.style.opacity = frac <= pos ? '1' : '0.05';\n        sp.style.color = '';\n        sp.textContent = sp.dataset.orig;\n      });\n    }\n  };\n\n  const fn = ANIMS[name];\n  if (!fn) return;\n\n  const loop = () => {\n    fn(_animState.frame++, _animState);\n    _animRAF = requestAnimationFrame(loop);\n  };\n  loop();\n}\n\n/* ════════════════════════════════════════════ */\n/*  CLIPBOARD + TOAST                          */\n/* ════════════════════════════════════════════ */\nlet _toastTimer;\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  clearTimeout(_toastTimer);\n  _toastTimer = setTimeout(() => t.classList.remove('show'), 1800);\n}\n\nasync function copyText(text) {\n  // Try execCommand synchronously first (preserves user-gesture context)\n  try {\n    const ta = document.createElement('textarea');\n    ta.value = text;\n    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';\n    document.body.appendChild(ta);\n    ta.focus(); ta.select();\n    const ok = document.execCommand('copy');\n    document.body.removeChild(ta);\n    if (ok) return true;\n  } catch(e) {}\n  // Async clipboard API fallback\n  try { await navigator.clipboard.writeText(text); return true; } catch(e) {}\n  return false;\n}\n\n/* ════════════════════════════════════════════ */\n/*  RENDER CONTACT CELLS                       */\n/* ════════════════════════════════════════════ */\nfunction renderContactCells() {\n  const grid = document.getElementById('contact-grid');\n  if (!grid) return;\n  const cells = (DATA.contactCells || []).slice(0, DATA.contactCellCount ?? 4);\n  if (!cells.length) { grid.style.display = 'none'; return; }\n  grid.style.display = '';\n  grid.innerHTML = cells.map((c, i) => {\n    const hint = c.action === 'copy' ? 'cliquer pour copier ↵'\n               : c.action === 'open' ? 'ouvrir ↗'\n               : '';\n    return `\n      <div class=\"contact-cell\" data-idx=\"${i}\">\n        <div class=\"c-label\">${c.label}<\u002Fdiv>\n        <div class=\"c-value\">${c.value}<\u002Fdiv>\n        ${hint ? `<div class=\"c-hint\">${hint}<\u002Fdiv>` : ''}\n        <div class=\"c-flash\">✓ copié<\u002Fdiv>\n      <\u002Fdiv>`;\n  }).join('');\n\n  grid.querySelectorAll('.contact-cell').forEach(cell => {\n    const idx = parseInt(cell.dataset.idx);\n    const cfg = cells[idx];\n    if (!cfg || cfg.action === 'none') return;\n    cell.addEventListener('click', () => {\n      if (cfg.action === 'copy') {\n        // Show feedback optimistically — don't wait for clipboard result\n        cell.classList.add('copied');\n        showToast('✓ ' + cfg.value + ' copié');\n        setTimeout(() => cell.classList.remove('copied'), 1400);\n        copyText(cfg.value);\n      } else if (cfg.action === 'open') {\n        window.open(cfg.url || '#', '_blank');\n      }\n    });\n  });\n}\n\n/* ════════════════════════════════════════════ */\n/*  ADMIN CELLS EDITOR                         */\n/* ════════════════════════════════════════════ */\nfunction renderCellsEditor() {\n  const count = DATA.contactCellCount ?? 4;\n  const cells = DATA.contactCells || [];\n  // ensure we have 6 slots\n  while (cells.length < 6) cells.push({ label: '', value: '', action: 'copy', url: '' });\n  DATA.contactCells = cells;\n\n  const slider = document.getElementById('adm-cell-count');\n  const countVal = document.getElementById('adm-cell-count-val');\n  if (slider) { slider.value = count; countVal.textContent = count; }\n\n  const editor = document.getElementById('adm-cells-editor');\n  if (!editor) return;\n  editor.innerHTML = Array.from({length: 6}, (_, i) => {\n    const c = cells[i] || { label:'', value:'', action:'copy', url:'' };\n    const hidden = i >= count ? 'opacity:0.35;pointer-events:none;' : '';\n    return `\n      <div class=\"adm-block\" style=\"${hidden}\" id=\"adm-cell-block-${i}\">\n        <div class=\"adm-block-title\">case[${i+1}]${i >= count ? ' — masquée' : ''}<\u002Fdiv>\n        <div class=\"adm-row-2\" style=\"margin-bottom:8px\">\n          <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">label<\u002Flabel>\n            <input class=\"adm-input\" data-cell=\"${i}\" data-key=\"label\" value=\"${c.label}\"><\u002Fdiv>\n          <div><label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">valeur affichée<\u002Flabel>\n            <input class=\"adm-input\" data-cell=\"${i}\" data-key=\"value\" value=\"${c.value}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;margin-bottom:8px\">\n          ${['copy','open','none'].map(a => `\n            <button class=\"tweak-pills\" style=\"flex:0\" onclick=\"setCellAction(${i},'${a}',this)\"\n              data-cell=\"${i}\" data-action=\"${a}\"\n              style=\"flex:1;background:${c.action===a?'var(--accent)':'transparent'};border:1px solid ${c.action===a?'var(--accent)':'var(--border-bright)'};color:${c.action===a?'var(--bg)':'var(--fg-dim)'};font-family:inherit;font-size:var(--fs-xs);padding:4px 10px;cursor:pointer;\">\n              ${a === 'copy' ? 'copier le texte' : a === 'open' ? 'ouvrir URL' : 'rien'}\n            <\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n        <div id=\"adm-cell-url-${i}\" style=\"${c.action!=='open'?'display:none':''}\">\n          <label style=\"font-size:var(--fs-xs);color:var(--fg-faint);display:block;margin-bottom:4px;\">URL à ouvrir<\u002Flabel>\n          <input class=\"adm-input\" data-cell=\"${i}\" data-key=\"url\" value=\"${c.url}\">\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction setCellAction(idx, action, btn) {\n  DATA.contactCells[idx].action = action;\n  const block = document.getElementById('adm-cell-block-' + idx);\n  block.querySelectorAll('[data-action]').forEach(b => {\n    const isOn = b.dataset.action === action;\n    b.style.background = isOn ? 'var(--accent)' : 'transparent';\n    b.style.borderColor = isOn ? 'var(--accent)' : 'var(--border-bright)';\n    b.style.color       = isOn ? 'var(--bg)'     : 'var(--fg-dim)';\n  });\n  const urlRow = document.getElementById('adm-cell-url-' + idx);\n  if (urlRow) urlRow.style.display = action === 'open' ? '' : 'none';\n}\nfunction bindFilters() {\n  document.querySelectorAll('.project-filters button').forEach(btn => {\n    btn.addEventListener('click', () => {\n      document.querySelectorAll('.project-filters button').forEach(b => b.classList.remove('active'));\n      btn.classList.add('active');\n      renderProjects(btn.dataset.filter);\n    });\n  });\n}\n\n\n\nfunction typeCmd() {\n  const el = document.getElementById('typed-cmd');\n  const text = './start --mode portfolio';\n  let i = 0;\n  const tick = () => {\n    if (i <= text.length) { el.textContent = text.slice(0,i); i++; setTimeout(tick, 40+Math.random()*60); }\n  };\n  tick();\n}\n\nfunction clock() {\n  const clk = document.getElementById('clock');\n  const upt = document.getElementById('uptime');\n  const lat = document.getElementById('foot-latency');\n  const mem = document.getElementById('foot-mem');\n  const startDate = new Date('2020-09-01');\n  const tick = () => {\n    const now = new Date();\n    clk.textContent = now.toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris', hour12: false });\n    if (upt) upt.textContent = `up ${Math.floor((now-startDate)/(1000*60*60*24))}d`;\n    lat.textContent = `ping ${(8+Math.random()*8).toFixed(0)}ms`;\n    mem.textContent = `mem ${(60+Math.random()*8).toFixed(0)}%`;\n  };\n  tick(); setInterval(tick, 1000);\n}\n\nfunction buildHash() {\n  document.getElementById('build-hash').textContent = Array.from({length:7},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');\n}\n\n/* ════════════════════════════════════════════ */\n/*  STICKY CHROME NAME ON SCROLL               */\n/* ════════════════════════════════════════════ */\nfunction initStickyName() {\n  const hero = document.querySelector('.hero');\n  const stickyEl = document.getElementById('chrome-sticky-name');\n  if (!hero || !stickyEl) return;\n  const observer = new IntersectionObserver(\n    ([entry]) => { stickyEl.classList.toggle('visible', !entry.isIntersecting); },\n    { threshold: 0, rootMargin: '-32px 0px 0px 0px' }\n  );\n  observer.observe(hero);\n}\n\n/* ════════════════════════════════════════════ */\n/*  TWEAKS                                     */\n/* ════════════════════════════════════════════ */\nlet tweakState = { ...TWEAK_DEFAULTS };\nfunction applyTweaks() {\n  const r = document.documentElement;\n  r.dataset.accent  = tweakState.accent;\n  r.dataset.theme   = tweakState.theme;\n  r.dataset.density = tweakState.density;\n  r.dataset.blink   = String(tweakState.show_blink_cursor);\n  // sync theme toggle\n  const cb = document.getElementById('theme-toggle-cb');\n  if (cb) cb.checked = (tweakState.theme === 'light');\n  document.querySelectorAll('.tweak-pills').forEach(grp => {\n    const key = grp.dataset.tweak;\n    grp.querySelectorAll('button').forEach(btn => btn.classList.toggle('on', btn.dataset.val === String(tweakState[key])));\n  });\n}\nfunction bindTweaks() {\n  document.querySelectorAll('.tweak-pills').forEach(grp => {\n    const key = grp.dataset.tweak;\n    grp.querySelectorAll('button').forEach(btn => {\n      btn.addEventListener('click', () => {\n        let v = btn.dataset.val;\n        if (v==='true') v=true; if (v==='false') v=false;\n        tweakState[key] = v; applyTweaks();\n        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:v}},'*'); } catch(e) {}\n      });\n    });\n  });\n}\n\nwindow.addEventListener('message', e => {\n  const d = e.data; if (!d || typeof d!=='object') return;\n  if (d.type==='__activate_edit_mode')   document.getElementById('tweaks').classList.add('visible');\n  if (d.type==='__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('visible');\n});\ntry { window.parent.postMessage({type:'__edit_mode_available'},'*'); } catch(e) {}\n\n/* ════════════════════════════════════════════ */\n/*  INIT                                       */\n/* ════════════════════════════════════════════ */\nfunction initPortfolio() {\n  loadData();\n  initBanner();\n  applyTweaks();\n\n  // Theme toggle in chrome bar\n  const themeCb = document.getElementById('theme-toggle-cb');\n  if (themeCb) {\n    themeCb.addEventListener('change', () => {\n      tweakState.theme = themeCb.checked ? 'light' : 'dark';\n      applyTweaks();\n      try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: tweakState.theme}},'*'); } catch(e) {}\n    });\n  }\n\n  applyData();\n  renderProjects();\n  bindFilters();\n  renderSkills();\n  renderTimeline();\n  bindTweaks();\n  typeCmd();\n  clock();\n  buildHash();\n  initStickyName();\n  initInteractiveTerm();\n  initPromptTypewriters();\n}\n\nif (document.readyState === 'loading') {\n  document.addEventListener('DOMContentLoaded', initPortfolio);\n} else {\n  initPortfolio();\n}\n\n/* ════════════════════════════════════════════ */\n/*  PROMPT TYPEWRITER                           */\n/* ════════════════════════════════════════════ */\nfunction initPromptTypewriters() {\n  var SPEED = 42; // ms per char\n  var typed = new Set();\n\n  function typeCmd(cmdEl, cursorEl, text, done) {\n    var i = 0;\n    cmdEl.textContent = '';\n    if (cursorEl) cursorEl.classList.remove('typed');\n    var iv = setInterval(function() {\n      cmdEl.textContent += text[i++];\n      if (i >= text.length) {\n        clearInterval(iv);\n        if (cursorEl) cursorEl.classList.add('typed');\n        if (done) done();\n      }\n    }, SPEED);\n  }\n\n  var obs = new IntersectionObserver(function(entries) {\n    entries.forEach(function(entry) {\n      if (!entry.isIntersecting) return;\n      var section = entry.target;\n      if (typed.has(section)) return;\n      typed.add(section);\n      var cmdEl    = section.querySelector('.prompt .cmd[data-cmd]');\n      var cursorEl = section.querySelector('.prompt .prompt-cursor');\n      if (!cmdEl) return;\n      var text = cmdEl.dataset.cmd || '';\n      // small delay so it feels natural after scroll\n      setTimeout(function() { typeCmd(cmdEl, cursorEl, text); }, 120);\n    });\n  }, { threshold: 0.15 });\n\n  document.querySelectorAll('section[data-screen-label]').forEach(function(s) {\n    obs.observe(s);\n  });\n}\n\n/* ════════════════════════════════════════════ */\n/*  INTERACTIVE TERMINAL                        */\n/* ════════════════════════════════════════════ */\nfunction initInteractiveTerm() {\n  const btn    = document.getElementById('term-btn');\n  const iterm  = document.getElementById('iterm');\n  const body   = document.getElementById('iterm-body');\n  const input  = document.getElementById('iterm-input');\n  const close  = document.getElementById('iterm-close');\n  let history  = [], histIdx = -1;\n  let snakeRunning = false, snakeTick = null;\n\n  function openTerm() {\n    iterm.classList.add('open');\n    btn.classList.add('open');\n    setTimeout(() => input.focus(), 320);\n  }\n  function closeTerm() {\n    iterm.classList.remove('open');\n    btn.classList.remove('open');\n    stopSnake();\n  }\n  btn.addEventListener('click', () => iterm.classList.contains('open') ? closeTerm() : openTerm());\n  close.addEventListener('click', closeTerm);\n  document.addEventListener('keydown', e => {\n    if (e.key === '`' && e.ctrlKey) { e.preventDefault(); iterm.classList.contains('open') ? closeTerm() : openTerm(); }\n  });\n\n  // ── Drag ──────────────────────────────────\n  var dragX=0, dragY=0, dragging=false;\n  iterm.querySelector('.iterm-chrome').addEventListener('mousedown', function(e) {\n    if (e.target === close || e.button !== 0) return;\n    dragging = true;\n    dragX = e.clientX - iterm.offsetLeft;\n    dra
